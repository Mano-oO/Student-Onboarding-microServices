<!DOCTYPE html>
<html>
<head>
<title>CSV Generator</title>
<style>
body{font-family:sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);display:flex;justify-content:center;align-items:center;height:100vh;margin:0;color:#fff}
.box{background:#ffffff1a;padding:30px;border-radius:15px;text-align:center}
input,button{padding:10px;margin:10px;border:none;border-radius:8px}
button{background:#00c853;color:#fff;cursor:pointer}
</style>
</head>

<body>
<div class="box">
<h2>CSV Generator 🚀</h2>

<input type="number" id="rows" placeholder="Rows">
<br>
<button onclick="gen()">Generate</button>

<p id="msg"></p>
</div>

<script>
function gen(){
 let r=document.getElementById("rows").value;
 if(!r||r<=0) return msg("Enter valid number");

 msg("Generating...");
 fetch("/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rows:r})})
 .then(res=>res.json())
 .then(d=>msg(d.status))
 .catch(()=>msg("Error!"));
}

function msg(t){document.getElementById("msg").innerText=t;}
</script>

</body>
</html>
