version: '3.8'

services:
  mysql_db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: Mano_o1868
      MYSQL_DATABASE: ServiceB_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mynetwork

  service-b:
    build:
      context: ./ServiceB/ServiceB
    container_name: service_b
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/ServiceB_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Mano_o1868
    depends_on:
      - mysql_db
    ports:
      - "8080:8080"
    networks:
      - mynetwork

  service-a:
    build:
      context: ./Service A
    container_name: service_a
    depends_on:
      - service-b
    ports:
      - "5000:5000"
    networks:
      - mynetwork
    volumes:
      - ./Service A/Data:/M1project/Data
      - ./Service A/Final:/M1project/Final

volumes:
  mysql_data:

networks:
  mynetwork:
    driver: bridge